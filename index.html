<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Dominion Idle</title>
  <link rel="stylesheet" href="css/style.css?v=15">
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header id="topbar">
      <div class="brand">🐉 Monster Dominion <span class="ver">Idle v0.1</span></div>
      <div class="resources">
        <span class="res" title="Gold">💰 <b id="gold">0</b></span>
        <span class="res" title="Kristalle">💎 <b id="crystals">0</b></span>
        <span class="res" title="Eier">🥚 <b id="eggs">0</b></span>
        <span class="res" title="Upgrade-Steine">🪨 <b id="stones">0</b></span>
        <span class="res atk" title="Gesamt-Angriff aller Monster">⚔️ <b id="totalAtk">0</b></span>
        <span class="res def" title="Gesamt-Verteidigung aller Monster">🛡️ <b id="totalDef">0</b></span>
      </div>
      <div class="xp-strip" title="Spieler-Erfahrung">
        <span class="xp-lvl">⭐ Lv <b id="playerLevel">1</b></span>
        <div class="xp-strip-bar"><div class="fill" id="pxp-fill"></div><div class="txt" id="pxp-txt"></div></div>
      </div>
    </header>

    <!-- Main view -->
    <main id="view"></main>

    <!-- Tab bar -->
    <nav id="tabbar">
      <button class="tab" data-tab="home">⚔️<span>Kampf</span></button>
      <button class="tab" data-tab="monster">🐾<span>Sammlung</span></button>
      <button class="tab" data-tab="summon">🔮<span>Summon</span></button>
      <button class="tab" data-tab="settings">⚙️<span>Settings</span></button>
    </nav>
  </div>

  <!-- Toast container -->
  <div id="toasts"></div>

  <!-- Modal overlay -->
  <div id="modal" class="hidden">
    <div id="modal-box"></div>
  </div>

  <script src="js/data.js?v=15"></script>
  <script src="js/monster.js?v=15"></script>
  <script src="js/battle.js?v=15"></script>
  <script src="js/save.js?v=15"></script>
  <script src="js/ui.js?v=15"></script>
  <script src="js/game.js?v=15"></script>
  <script src="js/main.js?v=15"></script>
</body>
</html>
